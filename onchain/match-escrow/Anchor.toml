[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
match_escrow = "5SZ2HjvXLQ3ic9uBBRahUTdEYTwk6pK4siwEMZefuDoi"

[registry]
url = "https://api.apr.dev"

[provider]
